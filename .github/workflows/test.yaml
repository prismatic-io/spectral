name: Test
on: [push]
jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Add node_modules binaries to PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> $GITHUB_PATH
      - name: Check Formatting
        run: bun run check
      - name: Build
        run: bun run build
      - name: Run Tests
        run: bun run test
      - name: Run Type Tests
        run: bun run tsd
